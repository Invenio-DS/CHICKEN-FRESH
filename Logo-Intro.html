<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>INVENIO - Logo-Intro-Chicken Fresh</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #000; 
            overflow: hidden;
        }

        .video-wrapper {
            position: relative;
            width: 100vw; 
            height: 100vh; 
        }

        #bg-video {
            position: absolute;
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            object-fit: cover; /* Asegura que el video cubra toda la pantalla */
        }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <video autoplay muted loop playsinline id="bg-video">
            <source src="Logo-Intro.mp4" type="video/mp4">
            Tu navegador no soporta video HTML5.
        </video>
    </div>

</body>
</html>
