<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>INVENIO - Lista de Precios Chicken Fresh</title>
    <style>
        /* --- VARIABLES GLOBALES --- */
        :root {
            --red: #dd1518; /* Dorado para el borde del BCV, puedes cambiarlo */
        }

        /* --- NUEVA FUENTE SANSITA BOLD --- */
        @font-face {
            font-family: 'SansitaBold';
            src: url('./Sansita-Bold.ttf') format('truetype');
            font-weight: bold; font-style: normal;
        }

        /* Fuente Handelson para la etiqueta de Agotado (opcional mantenerla) */
        @font-face {
            font-family: 'SansitaBold';
            src: url('./Sansita-Bold.ttf') format('truetype');
            font-weight: normal; font-style: normal;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .menu-wrapper {
            position: relative;
            width: 100vw; height: 56.25vw; 
            max-width: 1920px; max-height: 1080px;
            z-index: 1;
        }

        #bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0; 
        }

        #precios-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2; 
        }

        @keyframes fadeInPrecios {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- ESTILOS DE PRECIOS (AHORA CON SANSITA) --- */
        .dato-dinamico {
            position: absolute;
            font-family: 'SansitaBold', sans-serif; /* Cambio de fuente aquí */
            color: #FFFFFF;
            font-size: 2vw; /* Ligeramente más grande porque Sansita es más compacta */
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8); /* Sombra más fuerte para mejor lectura */
            white-space: nowrap;
            display: block;
            text-align: right; 
            width: 150px; 
            opacity: 0;
            animation: fadeInPrecios 0.8s ease-out forwards;
        }

        /* --- ESTILO PARA ETIQUETA AGOTADO --- */
        .etiqueta-agotado {
            position: absolute;
            background-color: #d32f2f; 
            color: #ffffff;
            font-family: 'HandelsonFour', 'SansitaBold', sans-serif;
            font-size: 2.5vw;
            padding: 0.5vw 1.5vw;
            border-radius: 0.5vw;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            border: 0.2vw solid #fff;
            transform: rotate(-15deg);
            z-index: 10;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.5);
            opacity: 0;
            animation: fadeInPrecios 0.8s ease-out forwards;
            letter-spacing: 2px;
        }

        /* --- WIDGET TASA BCV --- */
        .widget-container {
            position: absolute;
            top: 4%;    /* Modifica este valor para moverlo arriba/abajo */
            right: 3%;  /* Modifica este valor para moverlo a izquierda/derecha */
            z-index: 10;
        }

        .widget-tasa-rect { 
            border: 2px solid var(--accent-gold); 
            border-radius: 8px; 
            background: rgba(255, 255, 255, 0.95); /* Ligeramente translúcido */
            display: flex; align-items: center; padding: 6px 11px;
            width: auto; min-width: 12vw; height: 9vh; gap: 12px;
            font-family: 'Calibri', sans-serif;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4), inset 0 1px 2px rgba(255,255,255,0.7);
        }
        
        .tasa-logo { height: 7vh; }
        .tasa-data { display: flex; flex-direction: column; justify-content: center; text-align: left; }
        .tasa-label { font-size: 0.9vw; font-weight: bold; color: #1a1a1a; margin-bottom: 1px; }
        .valor-bcv-container { display: flex; align-items: baseline; gap: 6px; }
        .valor-bcv { font-size: 1.3vw; font-weight: 800; color: #1a1a1a; }
        .moneda-label { font-size: 0.8vw; font-weight: bold; color: #444; }
        #f-bcv { font-size: 0.75vw; color: #1a1a1a; margin-top: 1px; font-weight: bold; }

        /* --- COORDENADAS 3 COLUMNAS X 2 FILAS --- */
        .col-izq-ref { left: 14.5%; }
        .col-izq-bs  { left: 14.5%; }
    
        .col-cen-ref { left: 47.5%; } 
        .col-cen-bs  { left: 47.5%; }

        .col-der-ref { left: 81.5%; }
        .col-der-bs  { left: 81.5%; }

        .y-sup-ref { top: 30.5%; }
        .y-sup-bs  { top: 36.8%; }

        .y-inf-ref { top: 69.8%; }
        .y-inf-bs  { top: 76.1%; }

        /* --- SEGURIDAD Y ESTADO --- */
        #bloqueo-tecnico {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000; color: #fff;
            display: none; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999; text-align: center; font-family: sans-serif;
        }
        #bloqueo-tecnico h1 { font-size: 5vw; margin: 0; }

        #debug-status {
            position: fixed; bottom: 10px; left: 10px;
            font-size: 16px; z-index: 1000;
        }
        .online { color: #00FF00; opacity: 0.3; }
        .offline { color: #FF0000; opacity: 1; }

    </style>
</head>
<body>

    <div id="bloqueo-tecnico">
        <h1>CONTACTAR AL SERVICIO TÉCNICO</h1>
    </div>

    <div class="menu-wrapper" id="menu-container">
        <video id="bg-video" autoplay loop muted playsinline>
            <source src="Cortes-AA.mp4" type="video/mp4">
        </video>

        <div class="widget-container">
            <div class="widget-tasa-rect">
                <img src="https://drive.google.com/thumbnail?id=1IonvtvVyrtb1zGwggXqcpsSRCEfFfiLd&sz=w1000" class="tasa-logo" alt="BCV">
                <div class="tasa-data">
                    <div class="tasa-label">TASA BCV OFICIAL</div>
                    <div class="valor-bcv-container">
                        <span id="t-bcv" class="valor-bcv">---</span>
                        <span class="moneda-label">Bs./USD</span>
                    </div>
                    <div id="f-bcv">00/00/0000</div>
                </div>
            </div>
        </div>

        <div id="precios-container"></div>
    </div>
    
    <div id="debug-status"></div>

<script>
    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR5xjPLIwGplpHH4ZkWimjmZ0YX3vMjgYR89RQwT-bBclF4rv1rJrAwPUbjq6QsFRxFfISSbKQ3dwfK/pub?gid=0&single=true&output=csv";

    function parsearCSV(linea) {
        const columnas = [];
        let celda = "", dentroComillas = false;
        for (let char of linea) {
            if (char === '"') dentroComillas = !dentroComillas;
            else if (char === ',' && !dentroComillas) {
                columnas.push(celda.trim());
                celda = "";
            } else celda += char;
        }
        columnas.push(celda.trim());
        return columnas;
    }

    function formatearPrecio(texto, prefijo) {
        if (!texto || texto.trim() === "") return "";
        
        let numStr = texto.replace(/[^\d.,]/g, '');
        if (numStr === "") return texto; 
        
        if (numStr.includes('.') && numStr.includes(',')) {
            numStr = numStr.replace(/\./g, '').replace(',', '.'); 
        } else if (numStr.includes(',')) {
            numStr = numStr.replace(',', '.'); 
        }

        let numero = parseFloat(numStr);
        if (isNaN(numero)) return texto;

        let precioFormateado = new Intl.NumberFormat('es-VE', { 
            minimumFractionDigits: 2, 
            maximumFractionDigits: 2 
        }).format(numero);

        return `${prefijo} ${precioFormateado}`;
    }

    function renderizarMenu(csvText) {
        const lineas = csvText.split(/\r?\n/).filter(l => l.trim() !== "");
        const datos = lineas.slice(1); 
        const contenedorWrapper = document.getElementById('menu-container');
        const contenedorPrecios = document.getElementById('precios-container');
        const pantallaBloqueo = document.getElementById('bloqueo-tecnico');
        const debug = document.getElementById('debug-status');

        if (csvText.includes("BLOQUEAR")) {
            pantallaBloqueo.style.display = "flex";
            contenedorWrapper.style.display = "none";
            debug.innerHTML = "●"; 
            debug.className = "online";
            return;
        } else {
            pantallaBloqueo.style.display = "none";
            contenedorWrapper.style.display = "block";
        }

        let htmlFinal = "";

        const cuadrantes = [
            { ref: "col-izq-ref y-sup-ref", bs: "col-izq-bs y-sup-bs" }, 
            { ref: "col-cen-ref y-sup-ref", bs: "col-cen-bs y-sup-bs" }, 
            { ref: "col-der-ref y-sup-ref", bs: "col-der-bs y-sup-bs" }, 
            { ref: "col-izq-ref y-inf-ref", bs: "col-izq-bs y-inf-bs" }, 
            { ref: "col-cen-ref y-inf-ref", bs: "col-cen-bs y-inf-bs" }, 
            { ref: "col-der-ref y-inf-ref", bs: "col-der-bs y-inf-bs" }  
        ];

        datos.forEach((linea, i) => {
            if (i < 6) { 
                const col = parsearCSV(linea);
                
                const estado = col[2] ? col[2].toUpperCase().trim() : ""; 
                const precioRefRaw = col[3] ? col[3].trim() : "";            
                const precioBsRaw = col[4] ? col[4].trim() : "";             
                
                const precioRef = formatearPrecio(precioRefRaw, "Ref:");
                const precioBs = formatearPrecio(precioBsRaw, "Bs.");

                const pos = cuadrantes[i];

                if (estado === "AGOTADO") {
                    htmlFinal += `
                        <div class="etiqueta-agotado ${pos.ref}" style="margin-top: -1vw; margin-left: -3vw;">AGOTADO</div>
                    `;
                } else if (precioRef || precioBs) {
                    htmlFinal += `
                        <div class="dato-dinamico ${pos.ref}">${precioRef}</div>
                        <div class="dato-dinamico ${pos.bs}">${precioBs}</div>
                    `;
                }
            }
        });
        
        contenedorPrecios.innerHTML = htmlFinal;
        debug.innerHTML = "●";
        debug.className = "online";
    }

    async function sincronizar() {
        const t = new Date().getTime();
        const debug = document.getElementById('debug-status');
        try {
            const res = await fetch(`${sheetURL}&nocache=${t}`);
            if (!res.ok) throw new Error();
            const csvText = await res.text();
            localStorage.setItem('backup_m2_fresco', csvText);
            renderizarMenu(csvText);
        } catch (e) {
            const backup = localStorage.getItem('backup_m2_fresco');
            if (backup) renderizarMenu(backup);
            debug.innerHTML = "●";
            debug.className = "offline";
        }
    }

    sincronizar();
    setInterval(sincronizar, 120000); 
</script>
</body>
</html>
