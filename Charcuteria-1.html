<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>INVENIO - Lista de Precios Chicken Fresh (Charcutería)</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sansita:wght@700&display=swap" rel="stylesheet">

    <style>
        /* --- VARIABLES GLOBALES --- */
        :root {
            --accent-gold: #1b0b78; 
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .menu-wrapper {
            position: relative;
            width: 100vw; height: 56.25vw; 
            max-width: 1920px; max-height: 1080px;
            z-index: 1;
        }

        #bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0; 
        }

        #precios-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2; 
        }

        @keyframes fadeInPrecios {
            from { opacity: 0; transform: translateY(3px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- ESTILOS DE PRECIOS ADAPTADOS (Centrados sobre los cuadros de la imagen) --- */
        .dato-dinamico {
            position: absolute;
            font-family: 'Sansita', sans-serif; 
            font-weight: 700; 
            color: #FFFFFF;
            font-size: 1.45vw; 
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8); 
            white-space: nowrap;
            display: block;
            text-align: Right; 
            width: 12vw; /* Ancho ajustado al cuadro de fondo */
            opacity: 0;
            animation: fadeInPrecios 1s ease-out forwards;
        }

        /* --- ESTILO PARA ETIQUETA AGOTADO --- */
        .etiqueta-agotado {
            position: absolute;
            background-color: #d32f2f; 
            color: #ffffff;
            font-family: 'Sansita', sans-serif;
            font-size: 1.8vw;
            padding: 0.3vw 1vw;
            border-radius: 0.4vw;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            border: 0.15vw solid #fff;
            transform: rotate(-10deg);
            z-index: 10;
            box-shadow: 3px 3px 8px rgba(0,0,0,0.5);
            opacity: 0;
            text-align: center;
            width: 9vw;
            animation: fadeInPrecios 0.8s ease-out forwards;
            letter-spacing: 1px;
        }

        /* --- WIDGET TASA BCV --- */
        .widget-container {
            position: absolute;
            top: 4%;    
            right: 3%;  
            z-index: 10;
        }

        .widget-tasa-rect { 
            border: 2px solid var(--accent-gold); 
            border-radius: 8px; 
            background: rgba(255, 255, 255, 0.95); 
            display: flex; align-items: center; padding: 6px 11px;
            width: auto; min-width: 12vw; height: 9vh; gap: 12px;
            font-family: 'Calibri', sans-serif;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4), inset 0 1px 2px rgba(255,255,255,0.7);
        }
        
        .tasa-logo { height: 8vh; }
        .tasa-data { display: flex; flex-direction: column; justify-content: center; text-align: left; }
        .tasa-label { font-size: 1.2vw; font-weight: bold; color: #1a1a1a; margin-bottom: 1px; }
        .valor-bcv-container { display: flex; align-items: baseline; gap: 6px; }
        .valor-bcv { font-size: 1.6vw; font-weight: 800; color: #1a1a1a; }
        .moneda-label { font-size: 0.9vw; font-weight: bold; color: #444; }
        #f-bcv { font-size: 1.2vw; color: #1a1a1a; margin-top: 1px; font-weight: bold; }


        /* =========================================================================
           NUEVAS COORDENADAS PARA LA MATRIZ DE 4 COLUMNAS X 3 FILAS (CHARCUTERÍA)
           ========================================================================= */
        
        /* --- COLUMNAS (EJE X - HORIZONTAL) --- */
        .c-col-1 { left: 10.8%; }
        .c-col-2 { left: 35.8%; }
        .c-col-3 { left: 62.5%; }
        .c-col-4 { left: 86.0%; }

        /* --- FILAS (EJE Y - VERTICAL) --- */
        /* Fila 1 (Superior) */
        .c-f1-ref { top: 33.4%; }
        .c-f1-bs  { top: 38.8%; }

        /* Fila 2 (Central) */
        .c-f2-ref { top: 57.0%; }
        .c-f2-bs  { top: 62.3%; }

        /* Fila 3 (Inferior) */
        .c-f3-ref { top: 82.1%; }
        .c-f3-bs  { top: 87.3%; }

        /* Ajuste fino para la etiqueta AGOTADO en esta distribución */
        .c-agotado-f1 { top: 34.5%; }
        .c-agotado-f2 { top: 58.0%; }
        .c-agotado-f3 { top: 83.0%; }


        /* --- SEGURIDAD Y ESTADO --- */
        #bloqueo-tecnico {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000; color: #fff;
            display: none; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999; text-align: center; font-family: sans-serif;
        }
        #bloqueo-tecnico h1 { font-size: 5vw; margin: 0; }

        #debug-status {
            position: fixed; bottom: 10px; left: 10px;
            font-size: 16px; z-index: 1000;
        }
        .online { color: #00FF00; opacity: 0.3; }
        .offline { color: #FF0000; opacity: 1; }

    </style>
</head>
<body>

    <div id="bloqueo-tecnico">
        <h1>CONTACTAR AL SERVICIO TÉCNICO</h1>
    </div>

    <div class="menu-wrapper" id="menu-container">
        <video id="bg-video" autoplay loop muted playsinline>
            <source src="https://invenio-ds.github.io/CHICKEN-FRESH/Charcuteria-1.mp4" type="video/mp4">
        </video>

        <div class="widget-container">
            <div class="widget-tasa-rect">
                <img src="https://drive.google.com/thumbnail?id=1IonvtvVyrtb1zGwggXqcpsSRCEfFfiLd&sz=w1000" class="tasa-logo" alt="BCV">
                <div class="tasa-data">
                    <div class="tasa-label">TASA BCV OFICIAL</div>
                    <div class="valor-bcv-container">
                        <span id="t-bcv" class="valor-bcv">---</span>
                        <span class="moneda-label">Bs./USD</span>
                    </div>
                    <div id="f-bcv">00/00/0000</div>
                </div>
            </div>
        </div>

        <div id="precios-container"></div>
    </div>
    
    <div id="debug-status"></div>

<script>
    // URL CSV de Google Sheets para Chicken Fresh
    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR5xjPLIwGplpHH4ZkWimjmZ0YX3vMjgYR89RQwT-bBclF4rv1rJrAwPUbjq6QsFRxFfISSbKQ3dwfK/pub?gid=77581958&single=true&output=csv";

    // >>> CONFIGURACIÓN RANGO DE PRODUCTOS PARA ESTA PANTALLA DE 12 ITEMS <<<
    // Por ejemplo, si los 12 embutidos están en las líneas de la 1 a la 12 de tu hoja centralizada:
    const FILA_INICIO = 2;  
    const FILA_FIN    = 13; 

    function parsearCSV(linea) {
        const columnas = [];
        let celda = "", dentroComillas = false;
        for (let char of linea) {
            if (char === '"') dentroComillas = !dentroComillas;
            else if (char === ',' && !dentroComillas) {
                columnas.push(celda.trim());
                celda = "";
            } else celda += char;
        }
        columnas.push(celda.trim());
        return columnas;
    }

    function formatearPrecio(texto, prefijo) {
        if (!texto || texto.trim() === "") return "";
        
        let numStr = texto.replace(/[^\d.,]/g, '');
        if (numStr === "") return texto; 
        
        if (numStr.includes('.') && numStr.includes(',')) {
            numStr = numStr.replace(/\./g, '').replace(',', '.'); 
        } else if (numStr.includes(',')) {
            numStr = numStr.replace(',', '.'); 
        }

        let numero = parseFloat(numStr);
        if (isNaN(numero)) return texto;

        let precioFormateado = new Intl.NumberFormat('es-VE', { 
            minimumFractionDigits: 2, 
            maximumFractionDigits: 2  
        }).format(numero);

        return `${prefijo} ${precioFormateado}`;
    }

    function renderizarMenu(csvText) {
        const lineas = csvText.split(/\r?\n/).filter(l => l.trim() !== "");
        const datos = lineas; 
        
        const contenedorWrapper = document.getElementById('menu-container');
        const contenedorPrecios = document.getElementById('precios-container');
        const pantallaBloqueo = document.getElementById('bloqueo-tecnico');
        const debug = document.getElementById('debug-status');

        if (csvText.includes("BLOQUEAR")) {
            pantallaBloqueo.style.display = "flex";
            contenedorWrapper.style.display = "none";
            debug.innerHTML = "?"; 
            debug.className = "online";
            return;
        } else {
            pantallaBloqueo.style.display = "none";
            contenedorWrapper.style.display = "block";
        }

        // --- EXTRACCIÓN DE LA TASA BCV (Siempre lee la fila 1, columna F) ---
        if (datos.length > 0) {
            const primeraFila = parsearCSV(datos[1]);
            const tasaBCV = primeraFila[5] ? primeraFila[5].trim() : "---"; 
            document.getElementById('t-bcv').innerText = tasaBCV;

            const hoy = new Date();
            const fechaFormat = `${hoy.getDate().toString().padStart(2, '0')}/${(hoy.getMonth() + 1).toString().padStart(2, '0')}/${hoy.getFullYear()}`;
            document.getElementById('f-bcv').innerText = fechaFormat;
        }

        let htmlFinal = "";

        // MAPEO DE LOS 12 CUADRANTES DE LA MATRIZ (4 Columnas x 3 Filas)
        const cuadrantes = [
            // FILA 1 (Items 1 al 4)
            { ref: "c-col-1 c-f1-ref", bs: "c-col-1 c-f1-bs", agotado: "c-col-1 c-agotado-f1" },
            { ref: "c-col-2 c-f1-ref", bs: "c-col-2 c-f1-bs", agotado: "c-col-2 c-agotado-f1" },
            { ref: "c-col-3 c-f1-ref", bs: "c-col-3 c-f1-bs", agotado: "c-col-3 c-agotado-f1" },
            { ref: "c-col-4 c-f1-ref", bs: "c-col-4 c-f1-bs", agotado: "c-col-4 c-agotado-f1" },
            
            // FILA 2 (Items 5 al 8)
            { ref: "c-col-1 c-f2-ref", bs: "c-col-1 c-f2-bs", agotado: "c-col-1 c-agotado-f2" },
            { ref: "c-col-2 c-f2-ref", bs: "c-col-2 c-f2-bs", agotado: "c-col-2 c-agotado-f2" },
            { ref: "c-col-3 c-f2-ref", bs: "c-col-3 c-f2-bs", agotado: "c-col-3 c-agotado-f2" },
            { ref: "c-col-4 c-f2-ref", bs: "c-col-4 c-f2-bs", agotado: "c-col-4 c-agotado-f2" },
            
            // FILA 3 (Items 9 al 12)
            { ref: "c-col-1 c-f3-ref", bs: "c-col-1 c-f3-bs", agotado: "c-col-1 c-agotado-f3" },
            { ref: "c-col-2 c-f3-ref", bs: "c-col-2 c-f3-bs", agotado: "c-col-2 c-agotado-f3" },
            { ref: "c-col-3 c-f3-ref", bs: "c-col-3 c-f3-bs", agotado: "c-col-3 c-agotado-f3" },
            { ref: "c-col-4 c-f3-ref", bs: "c-col-4 c-f3-bs", agotado: "c-col-4 c-agotado-f3" }
        ];

        const idxInicio = FILA_INICIO - 1;
        const idxFin    = FILA_FIN;

        datos.forEach((linea, i) => {
            if (i >= idxInicio && i < idxFin) { 
                const col = parsearCSV(linea);
                
                const estado = col[2] ? col[2].toUpperCase().trim() : ""; 
                const precioRefRaw = col[3] ? col[3].trim() : "";            
                const precioBsRaw = col[4] ? col[4].trim() : "";             
                
                const precioRef = formatearPrecio(precioRefRaw, "Ref:");
                const precioBs = formatearPrecio(precioBsRaw, "Bs.");

                // Asignación automática al cuadrante correspondiente de los 12
                const pos = cuadrantes[i - idxInicio]; 

                if (pos) { 
                    if (estado === "AGOTADO") {
                        // Centramos el AGOTADO reduciendo el margen izquierdo sutilmente
                        htmlFinal += `
                            <div class="etiqueta-agotado ${pos.agotado}" style="margin-left: 1.2vw;">AGOTADO</div>
                        `;
                    } else if (precioRef || precioBs) {
                        htmlFinal += `
                            <div class="dato-dinamico ${pos.ref}">${precioRef}</div>
                            <div class="dato-dinamico ${pos.bs}">${precioBs}</div>
                        `;
                    }
                }
            }
        });
        
        if (contenedorPrecios.innerHTML !== htmlFinal) {
            contenedorPrecios.innerHTML = htmlFinal;
        }

        debug.innerHTML = "?";
        debug.className = "online";
    }

    async function sincronizar() {
        const t = new Date().getTime();
        const debug = document.getElementById('debug-status');
        try {
            const res = await fetch(`${sheetURL}&nocache=${t}`);
            if (!res.ok) throw new Error();
            const csvText = await res.text();
            localStorage.setItem('backup_m2_fresco', csvText);
            renderizarMenu(csvText);
        } catch (e) {
            const backup = localStorage.getItem('backup_m2_fresco');
            if (backup) renderizarMenu(backup);
            debug.innerHTML = "?";
            debug.className = "offline";
        }
    }

    sincronizar();
    setInterval(sincronizar, 120000); 
</script>
</body>
</html>
