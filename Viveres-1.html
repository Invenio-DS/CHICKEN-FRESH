<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>INVENIO - Lista de Precios Chicken Fresh (Línea de Tiempo)</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sansita:wght@700&display=swap" rel="stylesheet">

    <style>
        /* --- VARIABLES GLOBALES --- */
        :root {
            --accent-gold: #1b0b78; 
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .menu-wrapper {
            position: relative;
            width: 100vw; height: 56.25vw; 
            max-width: 1920px; max-height: 1080px;
            z-index: 1;
        }

        #bg-video {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: 0; 
        }

        #precios-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2; 
        }

        @keyframes fadeInEtiqueta {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* --- NUEVOS ESTILOS PARA RECTÁNGULOS DE PRECIOS DINÁMICOS --- */
        .contenedor-precios-dinamico {
            position: absolute;
            display: flex;
            gap: 1.5vw;
            z-index: 5;
            font-family: 'Sansita', sans-serif;
            animation: fadeInEtiqueta 0.4s ease-out forwards;
        }

        .columna-precio {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4vw;
            min-width: 15vw;
        }

        .titulo-tipo {
            color: #FFFFFF;
            font-size: 1.3vw;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
            margin-bottom: 0.1vw;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .bloque-precio {
            width: 100%;
            padding: 0.5vw 1vw;
            border-radius: 6px;
            color: #FFFFFF;
            font-size: 1.9vw;
            font-weight: 700;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            box-sizing: border-box;
            white-space: nowrap;
        }

        /* Colores exactos solicitados */
        .ref-box {
            background-color: #DD1518;
        }

        .bs-box {
            background-color: #E5600F;
            margin-top: -0.1vw;
        }

        /* Estilo adaptado para el AGOTADO por columna */
        .bloque-agotado {
            width: 100%;
            background-color: #d32f2f;
            color: #ffffff;
            font-size: 1.8vw;
            font-weight: 700;
            padding: 1.8vw 1vw;
            text-align: center;
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border: 0.15vw solid #fff;
            box-sizing: border-box;
            letter-spacing: 1px;
            transform: rotate(-3deg);
        }

        /* --- WIDGET TASA BCV --- */
        .widget-container {
            position: absolute;
            top: 4%;    
            right: 3%;  
            z-index: 10;
        }

        .widget-tasa-rect { 
            border: 2px solid var(--accent-gold); 
            border-radius: 8px; 
            background: rgba(255, 255, 255, 0.95); 
            display: flex; align-items: center; padding: 6px 11px;
            width: auto; min-width: 12vw; height: 9vh; gap: 12px;
            font-family: 'Calibri', sans-serif;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4), inset 0 1px 2px rgba(255,255,255,0.7);
        }
        
        .tasa-logo { height: 8vh; }
        .tasa-data { display: flex; flex-direction: column; justify-content: center; text-align: left; }
        .tasa-label { font-size: 1.2vw; font-weight: bold; color: #1a1a1a; margin-bottom: 1px; }
        .valor-bcv-container { display: flex; align-items: baseline; gap: 6px; }
        .valor-bcv { font-size: 1.6vw; font-weight: 800; color: #1a1a1a; }
        .moneda-label { font-size: 0.9vw; font-weight: bold; color: #444; }
        #f-bcv { font-size: 1.2vw; color: #1a1a1a; margin-top: 1px; font-weight: bold; }

        /* --- SEGURIDAD Y ESTADO --- */
        #bloqueo-tecnico {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000; color: #fff;
            display: none; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999; text-align: center; font-family: sans-serif;
        }
        #bloqueo-tecnico h1 { font-size: 5vw; margin: 0; }

        #debug-status {
            position: fixed; bottom: 10px; left: 10px;
            font-size: 16px; z-index: 1000;
        }
        .online { color: #00FF00; opacity: 0.3; }
        .offline { color: #FF0000; opacity: 1; }
    </style>
</head>
<body>

    <div id="bloqueo-tecnico">
        <h1>CONTACTAR AL SERVICIO TÉCNICO</h1>
    </div>

    <div class="menu-wrapper" id="menu-container">
        <video id="bg-video" autoplay loop muted playsinline preload="auto">
            <source src="https://invenio-ds.github.io/CHICKEN-FRESH/Viveres-1.mp4" type="video/mp4">
        </video>

        <div class="widget-container">
            <div class="widget-tasa-rect">
                <img src="https://drive.google.com/thumbnail?id=1IonvtvVyrtb1zGwggXqcpsSRCEfFfiLd&sz=w1000" class="tasa-logo" alt="BCV">
                <div class="tasa-data">
                    <div class="tasa-label">TASA BCV OFICIAL</div>
                    <div class="valor-bcv-container">
                        <span id="t-bcv" class="valor-bcv">---</span>
                        <span class="moneda-label">Bs./USD</span>
                    </div>
                    <div id="f-bcv">00/00/0000</div>
                </div>
            </div>
        </div>

        <div id="precios-container"></div>
    </div>
    
    <div id="debug-status"></div>

<script>
    // Nueva URL de tu hoja de cálculo (Gid: 654283172)
    var sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR5xjPLIwGplpHH4ZkWimjmZ0YX3vMjgYR89RQwT-bBclF4rv1rJrAwPUbjq6QsFRxFfISSbKQ3dwfK/pub?gid=654283172&single=true&output=csv";

    // --- TABLA DE CONFIGURACIÓN DE TIEMPOS Y UBICACIONES (MODIFICABLE) ---
    // start: segundo en que aparece | end: segundo en que desaparece.
    // Puedes usar top, bottom, left o right para mover las etiquetas por producto.
    var CONFIG_PRODUCTOS = [
        { row: 1,  start: 0,  end: 8,   bottom: "6%", right: "6%" },
        { row: 2,  start: 8,  end: 16,  bottom: "6%", right: "6%" },
        { row: 3,  start: 16, end: 24,  bottom: "6%", right: "6%" },
        { row: 4,  start: 24, end: 32,  bottom: "6%", right: "6%" },
        { row: 5,  start: 32, end: 40,  bottom: "6%", right: "6%" },
        { row: 6,  start: 40, end: 48,  bottom: "6%", right: "6%" },
        { row: 7,  start: 48, end: 56,  bottom: "6%", right: "6%" },
        { row: 8,  start: 56, end: 64,  bottom: "6%", right: "6%" },
        { row: 9,  start: 64, end: 72,  bottom: "6%", right: "6%" },
        { row: 10, start: 72, end: 83,  bottom: "6%", right: "6%" }
    ];

    // Índices de lectura para la Tasa BCV (Por defecto: Fila 1, columna 8 / Índice 7)
    // Cámbialos si moviste la celda de la tasa en este nuevo documento.
    var TASA_ROW_INDEX = 1;
    var TASA_COL_INDEX = 9;

    var datosGlobales = []; // Guarda las filas del Excel

    // Forzar reproducción del video en TVs
    window.addEventListener('DOMContentLoaded', function() {
        var video = document.getElementById('bg-video');
        if (video) {
            video.play().catch(function(e) { console.log("Video bloqueado temporalmente"); });
        }
    });

    // Escuchador de la línea de tiempo del video
    var videoElement = document.getElementById('bg-video');
    videoElement.addEventListener('timeupdate', function() {
        if (datosGlobales.length === 0) return;

        var currentTime = videoElement.currentTime;
        var productoActivo = null;

        // Buscar si algún producto debe mostrarse en este segundo exacto
        for (var i = 0; i < CONFIG_PRODUCTOS.length; i++) {
            var prod = CONFIG_PRODUCTOS[i];
            if (currentTime >= prod.start && currentTime <= prod.end) {
                productoActivo = prod;
                break;
            }
        }

        if (productoActivo) {
            dibujarPrecios(productoActivo);
        } else {
            document.getElementById('precios-container').innerHTML = ""; // Limpiar pantalla si no hay producto en este lapso
        }
    });

    function parsearCSV(linea) {
        var columnas = [];
        var celda = "", dentroComillas = false;
        for (var i = 0; i < linea.length; i++) {
            var char = linea[i];
            if (char === '"') dentroComillas = !dentroComillas;
            else if (char === ',' && !dentroComillas) {
                columnas.push(celda.trim());
                celda = "";
            } else celda += char;
        }
        columnas.push(celda.trim());
        return columnas;
    }

    function formatearPrecio(texto, prefijo) {
        if (!texto || texto.trim() === "") return "";
        
        var numStr = texto.replace(/[^\d.,]/g, '');
        if (numStr === "") return texto; 
        
        if (numStr.includes('.') && numStr.includes(',')) {
            numStr = numStr.replace(/\./g, '').replace(',', '.'); 
        } else if (numStr.includes(',')) {
            numStr = numStr.replace(',', '.'); 
        }

        var numero = parseFloat(numStr);
        if (isNaN(numero)) return texto;

        var precioFormateado = new Intl.NumberFormat('es-VE', { 
            minimumFractionDigits: 2, 
            maximumFractionDigits: 2 
        }).format(numero);

        return prefijo + " " + precioFormateado;
    }

    function procesarDatosMenu(csvText) {
        var lineas = csvText.split(/\r?\n/).filter(function(l) { return l.trim() !== ""; });
        var datos = lineas.slice(1); 
        var contenedorWrapper = document.getElementById('menu-container');
        var pantallaBloqueo = document.getElementById('bloqueo-tecnico');
        var debug = document.getElementById('debug-status');

        if (csvText.includes("BLOQUEAR")) {
            pantallaBloqueo.style.display = "flex";
            contenedorWrapper.style.display = "none";
            return;
        } else {
            pantallaBloqueo.style.display = "none";
            contenedorWrapper.style.display = "block";
        }

        // Guardar filas en la memoria global estructurada
        datosGlobales = [];
        for (var i = 0; i < datos.length; i++) {
            datosGlobales.push(parsearCSV(datos[i]));
        }

        // Procesar Tasa BCV Dinámica
        if (datosGlobales.length > TASA_ROW_INDEX) {
            var filaTasa = datosGlobales[TASA_ROW_INDEX];
            var tasaBCV = filaTasa[TASA_COL_INDEX] ? filaTasa[TASA_COL_INDEX].trim() : "---"; 
            document.getElementById('t-bcv').innerText = tasaBCV;

            var hoy = new Date();
            var fechaFormat = (hoy.getDate().toString().padStart(2, '0')) + "/" + ((hoy.getMonth() + 1).toString().padStart(2, '0')) + "/" + hoy.getFullYear();
            document.getElementById('f-bcv').innerText = fechaFormat;
        }

        debug.innerHTML = "?";
        debug.className = "online";
    }

    // Dibuja los bloques estructurados del producto en pantalla basado en sus coordenadas
    function dibujarPrecios(prodConfig) {
        var filaIndex = prodConfig.row - 1;
        if (filaIndex >= datosGlobales.length) return;

        var col = datosGlobales[filaIndex];
        
        // Mapeo de columnas solicitado por el cliente:
        var agotadoBulto = col[1] ? col[1].toUpperCase().trim() : ""; 
        var agotadoDetal = col[2] ? col[2].toUpperCase().trim() : ""; 
        var refBulto     = formatearPrecio(col[3], "Ref:");
        var refDetal     = formatearPrecio(col[4], "Ref:");
        var bsBulto      = formatearPrecio(col[5], "Bs.");
        var bsDetal      = formatearPrecio(col[6], "Bs.");

        // Construcción de la columna POR BULTO
        var htmlBulto = "";
        if (agotadoBulto === "AGOTADO") {
            htmlBulto = '<div class="bloque-agotado">AGOTADO</div>';
        } else {
            htmlBulto = '<div class="bloque-precio ref-box">' + refBulto + '</div>' +
                        '<div class="bloque-precio bs-box">' + bsBulto + '</div>';
        }

        // Construcción de la columna AL DETAL
        var htmlDetal = "";
        if (agotadoDetal === "AGOTADO") {
            htmlDetal = '<div class="bloque-agotado">AGOTADO</div>';
        } else {
            htmlDetal = '<div class="bloque-precio ref-box">' + refDetal + '</div>' +
                        '<div class="bloque-precio bs-box">' + bsDetal + '</div>';
        }

        // Configuración dinámica de ubicación CSS
        var estilosPosicion = "";
        if (prodConfig.top) estilosPosicion += "top:" + prodConfig.top + ";";
        if (prodConfig.bottom) estilosPosicion += "bottom:" + prodConfig.bottom + ";";
        if (prodConfig.left) estilosPosicion += "left:" + prodConfig.left + ";";
        if (prodConfig.right) estilosPosicion += "right:" + prodConfig.right + ";";

        var htmlFinal = '<div class="contenedor-precios-dinamico" style="' + estilosPosicion + '">' +
                        '  <div class="columna-precio">' +
                        '    <div class="titulo-tipo">POR BULTO</div>' +
                             htmlBulto +
                        '  </div>' +
                        '  <div class="columna-precio">' +
                        '    <div class="titulo-tipo">AL DETAL</div>' +
                             htmlDetal +
                        '  </div>' +
                        '</div>';

        var contenedor = document.getElementById('precios-container');
        if (contenedor.innerHTML !== htmlFinal) {
            contenedor.innerHTML = htmlFinal;
        }
    }

    function sincronizar() {
        var t = new Date().getTime();
        var debug = document.getElementById('debug-status');
        
        var xhr = new XMLHttpRequest();
        xhr.open("GET", sheetURL + "&nocache=" + t, true);
        
        xhr.onreadystatechange = function () {
            if (xhr.readyState === 4) {
                if (xhr.status === 200) {
                    var csvText = xhr.responseText;
                    localStorage.setItem('backup_timeline_fresco', csvText);
                    procesarDatosMenu(csvText);
                } else {
                    ejecutarBackup(debug);
                }
            }
        };
        
        xhr.onerror = function() { ejecutarBackup(debug); };
        xhr.send();
    }

    function ejecutarBackup(debug) {
        var backup = localStorage.getItem('backup_timeline_fresco');
        if (backup) procesarDatosMenu(backup);
        debug.innerHTML = "?";
        debug.className = "offline";
    }

    sincronizar();
    setInterval(sincronizar, 120000); 
</script>
</body>
</html>
